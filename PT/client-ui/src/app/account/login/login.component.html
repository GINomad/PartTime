<div class="row justify-content-center">
  <div class="col-md-4 text-center">
    <form #f="ngForm" (ngSubmit)="onSubmit()">
      <h1 class="h3 mb-3 font-weight-normal">Login</h1>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" id="email" #email="ngModel" [(ngModel)]="userLogin.email" name="email" placeholder="Email" email required>
        <mat-error *ngIf="!email.valid">Enter a valid email</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input id="password" name="password" [(ngModel)]="userLogin.password" matInput [type]="hide ? 'password' : 'text'" required>
      </mat-form-field>
      <button class="btn btn-lg btn-primary btn-block" type="submit" [disabled]="!f.form.valid">Login</button>
      <ngx-spinner></ngx-spinner>
      <div *ngIf="error" class="alert alert-danger mt-3" role="alert">
        <strong>Oops!</strong> {{error}}
      </div>
    </form>
  </div>
</div>
